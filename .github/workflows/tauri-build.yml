name: Tauri Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "lts/*"
  RUST_BACKTRACE: 1

jobs:
  desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate app icons
        run: npm run icons

      - name: Build frontend
        run: npm run build

      - name: Build Tauri desktop app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('OrcaSVN {0}', github.ref_name) || '' }}
          releaseBody: "Desktop builds for Windows, Linux, and macOS."
          releaseDraft: false
          prerelease: false

  publish-to-winget:
    name: Publish to WinGet
    runs-on: windows-latest
    needs: desktop
    continue-on-error: true
    steps:
      - name: Get version from tag
        id: get-version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate WinGet token
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            Write-Output "::error::WINGET_TOKEN is missing. Create a classic GitHub PAT with public_repo scope and save it as the WINGET_TOKEN repository secret."
            exit 1
          }

          try {
            $response = Invoke-RestMethod `
              -Uri "https://api.github.com/user" `
              -Headers @{
                Authorization = "Bearer $env:WINGET_TOKEN"
                Accept = "application/vnd.github+json"
                "X-GitHub-Api-Version" = "2022-11-28"
              }
            Write-Output "WinGet token authenticated as $($response.login)."
          } catch {
            Write-Output "::error::WINGET_TOKEN is invalid for winget-releaser. Use a classic GitHub PAT with public_repo scope; fine-grained PATs are not supported."
            exit 1
          }

      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: OrcaSVN.OrcaSVN
          version: ${{ steps.get-version.outputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
          fork-user: ZeroMarker
          installers-regex: '\.exe$'
