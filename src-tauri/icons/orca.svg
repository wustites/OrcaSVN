<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 650" width="100%" height="100%">
  <defs>
    <!-- Gradients for a polished look -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE" />
      <stop offset="100%" stop-color="#B3E5FC" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1D20" />
      <stop offset="100%" stop-color="#0D0E10" />
    </linearGradient>
  </defs>

  <g transform="translate(0 150)">
  <!-- Background Circle (Water) -->
  <circle cx="325" cy="175" r="160" fill="url(#waterGrad)" />

  <!-- Saddle Patch (Grey marking behind the dorsal fin) -->
  <path d="M 285 110 Q 320 95, 360 110 Q 350 125, 310 125 Z" fill="#90A4AE" opacity="0.6" />

  <!-- Main Body (Black) -->
  <path d="M 80 180 
           C 60 180, 60 140, 100 120 
           C 150 100, 220 100, 300 110 
           C 400 120, 480 150, 510 165 
           C 530 120, 550 120, 570 145 
           Q 555 160, 550 165 
           C 555 210, 530 215, 510 165 
           C 480 195, 400 220, 300 225 
           C 200 230, 100 210, 80 180 Z" 
        fill="url(#bodyGrad)" />

  <!-- Dorsal Fin -->
  <path d="M 230 105 Q 260 15, 280 10 Q 295 50, 285 112 Z" fill="url(#bodyGrad)" />

  <!-- White Belly Patch -->
  <path d="M 85 190 
           C 100 210, 200 220, 300 215 
           C 400 210, 450 190, 500 175 
           C 450 185, 380 200, 300 205 
           C 200 210, 100 200, 85 190 Z" 
        fill="#F2F4F8" />

  <!-- Pectoral Fin -->
  <path d="M 170 210 Q 190 250, 240 230 Q 220 200, 190 195 Z" fill="url(#bodyGrad)" />

  <!-- Eye Patch -->
  <ellipse cx="140" cy="150" rx="15" ry="7" transform="rotate(-15 140 150)" fill="#F2F4F8" />

  <!-- Eye -->
  <circle cx="120" cy="150" r="4" fill="#1A1D20" />

  <!-- Mouth Line -->
  <path d="M 70 180 Q 90 185, 110 180" stroke="#1A1D20" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Sleek Highlight on the Back -->
  <path d="M 120 120 C 180 105, 250 105, 300 112" stroke="#F2F4F8" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round" />

  <!-- Water Splash & Droplets (Tail) -->
  <path d="M 540 140 Q 550 110, 560 140 Q 570 100, 580 140" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8" />
  <circle cx="545" cy="100" r="3" fill="#FFFFFF" opacity="0.9" />
  <circle cx="565" cy="90" r="4" fill="#FFFFFF" opacity="0.9" />
  <circle cx="575" cy="115" r="2" fill="#FFFFFF" opacity="0.9" />
  <circle cx="585" cy="105" r="2.5" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>
